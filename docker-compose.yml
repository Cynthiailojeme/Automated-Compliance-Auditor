services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--collector.textfile.directory=/metrics'
    volumes:
      - ./metrics:/metrics:ro
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter

  auditor:
    build: ./auditor
    container_name: auditor
    volumes:
      - ./scripts:/scripts:ro
      - ./metrics:/metrics
      - ./reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      METRICS_DIR: /metrics
      REPORT_DIR: /reports
    command: ["/bin/sh", "-c", "while true; do bash /scripts/audit.sh || true; sleep 60; done"]
    restart: unless-stopped